<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#02040a"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="#c9a84c" stroke-width="3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>

  <!-- Dashed ring -->
  <circle cx="256" cy="256" r="162" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25" stroke-dasharray="4 6"/>

  <!-- Logo B box -->
  <rect x="150" y="145" width="106" height="106" rx="22" fill="#1a365d" stroke="#c9a84c" stroke-width="2"/>
  <text x="203" y="210" text-anchor="middle" fill="#c9a84c" font-size="62" font-weight="bold" font-family="system-ui, sans-serif">B</text>

  <!-- Green checkmark circle -->
  <circle cx="278" cy="140" r="16" fill="#10b981" stroke="#02040a" stroke-width="2"/>
  <polyline points="270,140 275,146 287,135" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "BRAINSAIT" -->
  <text x="256" y="312" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="3">BRAINSAIT</text>

  <!-- "TRUSTED" -->
  <text x="256" y="345" text-anchor="middle" fill="#c9a84c" font-size="20" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="2">✦  TRUSTED  ✦</text>

  <!-- Top arc text -->
  <path id="topArc" d="M 60,256 A 196,196 0 0,1 452,256" fill="none"/>
  <text fill="#e0c878" font-size="11" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">✦  VERIFIED BY BRAINSAIT TRUST LAYER  ✦</textPath>
  </text>

  <!-- Bottom arc text -->
  <path id="bottomArc" d="M 80,300 A 180,180 0 0,0 432,300" fill="none"/>
  <text fill="#94a3b8" font-size="10" font-weight="600" font-family="system-ui, sans-serif" letter-spacing="1">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">NPHIES  ·  FHIR R4  ·  ZATCA  ·  VISION 2030</textPath>
  </text>

  <!-- Corner stars -->
  <text x="95" y="138" fill="#c9a84c" font-size="16" opacity="0.3" text-anchor="middle">★</text>
  <text x="417" y="138" fill="#c9a84c" font-size="16" opacity="0.3" text-anchor="middle">★</text>
  <text x="95" y="400" fill="#c9a84c" font-size="16" opacity="0.3" text-anchor="middle">★</text>
  <text x="417" y="400" fill="#c9a84c" font-size="16" opacity="0.3" text-anchor="middle">★</text>

  <!-- Gold accent lines -->
  <line x1="0" y1="2" x2="512" y2="2" stroke="#c9a84c" stroke-width="2"/>
  <line x1="0" y1="510" x2="512" y2="510" stroke="#c9a84c" stroke-width="2"/>
</svg>

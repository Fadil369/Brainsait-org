{% extends "base/header.html" %}

{% block site_nav %}
  {{ super() }}

  <!-- Enhanced Language Selector in Header -->
  <style>
    .header-lang-selector {
      display: flex;
      align-items: center;
      margin-left: var(--space-md);
      gap: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-full);
      padding: 2px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    [dir="rtl"] .header-lang-selector {
      margin-left: 0;
      margin-right: var(--space-md);
    }

    .header-lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition-fast);
      color: rgba(255, 255, 255, 0.7);
      min-width: 40px;
    }

    .header-lang-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.15);
    }

    .header-lang-btn--active {
      background: white;
      color: var(--brainsait-midnight);
    }

    .header-lang-btn--active:hover {
      background: white;
      color: var(--brainsait-midnight);
    }

    @media (max-width: 76.1875em) {
      .header-lang-selector {
        display: none;
      }
    }
  </style>

  <div class="header-lang-selector">
    <a href="{{ config.site_url }}en/"
       class="header-lang-btn {% if config.theme.language == 'en' %}header-lang-btn--active{% endif %}"
       title="English">
      EN
    </a>
    <a href="{{ config.site_url }}ar/"
       class="header-lang-btn {% if config.theme.language == 'ar' %}header-lang-btn--active{% endif %}"
       title="العربية">
      عر
    </a>
  </div>
{% endblock %}

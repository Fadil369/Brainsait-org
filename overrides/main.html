{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
{% endblock %}

{% block content %}
  {{ super() }}

  <!-- Prominent Language Toggle -->
  <div class="language-toggle-wrapper" id="languageToggle">
    <div class="language-toggle">
      <a href="{{ config.site_url }}en/"
         class="language-toggle__btn {% if config.theme.language == 'en' or page.url.startswith('en/') %}language-toggle__btn--active{% endif %}"
         title="Switch to English"
         aria-label="Switch to English">
        <svg class="language-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>EN</span>
      </a>
      <a href="{{ config.site_url }}ar/"
         class="language-toggle__btn {% if config.theme.language == 'ar' or page.url.startswith('ar/') %}language-toggle__btn--active{% endif %}"
         title="التبديل إلى العربية"
         aria-label="التبديل إلى العربية"
         dir="rtl">
        <svg class="language-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>عربي</span>
      </a>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    // Language Toggle Enhancement Script
    (function() {
      'use strict';

      // Detect current language from URL
      function getCurrentLanguage() {
        const path = window.location.pathname;
        if (path.includes('/ar/')) return 'ar';
        if (path.includes('/en/')) return 'en';
        return 'en'; // Default to English
      }

      // Update toggle state based on current language
      function updateToggleState() {
        const currentLang = getCurrentLanguage();
        const toggleBtns = document.querySelectorAll('.language-toggle__btn');

        toggleBtns.forEach(btn => {
          const href = btn.getAttribute('href');
          const isArabic = href && href.includes('/ar/');
          const isEnglish = href && href.includes('/en/');

          btn.classList.remove('language-toggle__btn--active');

          if ((currentLang === 'ar' && isArabic) || (currentLang === 'en' && isEnglish)) {
            btn.classList.add('language-toggle__btn--active');
          }
        });

        // Set document direction based on language
        if (currentLang === 'ar') {
          document.documentElement.setAttribute('dir', 'rtl');
          document.documentElement.setAttribute('lang', 'ar');
          document.body.classList.add('ar-mode');
          document.body.classList.remove('en-mode');
        } else {
          document.documentElement.setAttribute('dir', 'ltr');
          document.documentElement.setAttribute('lang', 'en');
          document.body.classList.add('en-mode');
          document.body.classList.remove('ar-mode');
        }
      }

      // Handle toggle click with smooth page transition
      function handleToggleClick(event) {
        const btn = event.currentTarget;
        if (btn.classList.contains('language-toggle__btn--active')) {
          event.preventDefault();
          return;
        }

        // Add transition effect
        document.body.style.opacity = '0.7';
        document.body.style.transition = 'opacity 0.2s ease';
      }

      // Get corresponding page in other language
      function getCorrespondingPage(targetLang) {
        const currentPath = window.location.pathname;
        const baseUrl = '{{ config.site_url }}';

        // Extract the page path without language prefix
        let pagePath = currentPath
          .replace(/^\/brainsait-docs\/(en|ar)\//, '/')
          .replace(/^\//, '');

        // If we're on index, keep it simple
        if (!pagePath || pagePath === '' || pagePath === 'index.html') {
          pagePath = '';
        }

        return baseUrl + targetLang + '/' + pagePath;
      }

      function localizeNavLabels(root = document) {
        const currentLang = getCurrentLanguage();
        const isArabic = currentLang === 'ar';
        const selectors = [
          '.md-tabs__link',
          '.md-nav__link',
          '.md-nav__title',
          '.md-footer__link'
        ];
        root.querySelectorAll(selectors.join(',')).forEach(node => {
          const labelEl = node.querySelector('.md-ellipsis') || node;
          if (!labelEl) return;
          const raw = labelEl.dataset.originalLabel || labelEl.textContent.trim();
          if (!labelEl.dataset.originalLabel) {
            labelEl.dataset.originalLabel = raw;
          }
          const hasSeparator = raw.includes('|');
          if (!hasSeparator && !labelEl.dataset.labelEn) return;
          if (hasSeparator && !labelEl.dataset.labelEn) {
            const [en, ar] = raw.split('|').map(part => part.trim());
            labelEl.dataset.labelEn = en || raw.trim();
            labelEl.dataset.labelAr = ar || en || raw.trim();
          }
          const label = isArabic
            ? (labelEl.dataset.labelAr || labelEl.dataset.labelEn)
            : (labelEl.dataset.labelEn || labelEl.dataset.labelAr);
          if (label) {
            labelEl.textContent = label;
          }
        });
      }

      function renderPageHierarchy() {
        const container = document.querySelector('.md-content__inner');
        if (!container) return;

        const existing = container.querySelector('.page-hierarchy');
        if (existing) existing.remove();

        const activeLinks = document.querySelectorAll('.md-nav__item--active > .md-nav__link');
        if (!activeLinks.length) return;

        const crumbs = Array.from(activeLinks).map(link => {
          const labelEl = link.querySelector('.md-ellipsis') || link;
          const text = labelEl ? labelEl.textContent.trim() : link.textContent.trim();
          return {
            text,
            href: link.getAttribute('href')
          };
        }).filter(crumb => crumb.text);

        if (!crumbs.length) return;

        const wrapper = document.createElement('section');
        wrapper.className = 'page-hierarchy';

        const isArabic = getCurrentLanguage() === 'ar';
        const labelText = isArabic ? 'مسار الصفحة' : 'Page hierarchy';
        const separator = document.documentElement.getAttribute('dir') === 'rtl' ? '‹' : '›';

        const label = document.createElement('div');
        label.className = 'page-hierarchy__label';
        label.textContent = labelText;
        wrapper.appendChild(label);

        const crumbNav = document.createElement('nav');
        crumbNav.className = 'page-hierarchy__crumbs';

        crumbs.forEach(function(crumb, index) {
          if (index > 0) {
            const sep = document.createElement('span');
            sep.className = 'page-hierarchy__separator';
            sep.textContent = separator;
            crumbNav.appendChild(sep);
          }

          if (crumb.href && index < crumbs.length - 1) {
            const link = document.createElement('a');
            link.href = crumb.href;
            link.textContent = crumb.text;
            crumbNav.appendChild(link);
          } else {
            const span = document.createElement('span');
            span.textContent = crumb.text;
            crumbNav.appendChild(span);
          }
        });

        wrapper.appendChild(crumbNav);
        container.insertBefore(wrapper, container.firstChild);
      }

      function refreshEnterpriseUI() {
        localizeNavLabels();
        renderPageHierarchy();
      }

      // Initialize
      document.addEventListener('DOMContentLoaded', function() {
        updateToggleState();
        refreshEnterpriseUI();

        // Add click handlers
        const toggleBtns = document.querySelectorAll('.language-toggle__btn');
        toggleBtns.forEach(btn => {
          btn.addEventListener('click', handleToggleClick);

          // Update href to point to corresponding page
          const href = btn.getAttribute('href');
          if (href) {
            const targetLang = href.includes('/ar/') ? 'ar' : 'en';
            const correspondingPage = getCorrespondingPage(targetLang);
            btn.setAttribute('href', correspondingPage);
          }
        });

        // Show toggle with animation
        const toggle = document.getElementById('languageToggle');
        if (toggle) {
          toggle.style.opacity = '0';
          toggle.style.transform = 'translateY(-50%) translateX(20px)';

          setTimeout(function() {
            toggle.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
            toggle.style.opacity = '1';
            toggle.style.transform = 'translateY(-50%) translateX(0)';
          }, 300);
        }
      });

      // Update on navigation (for instant loading)
      if (typeof document$ !== 'undefined') {
        document$.subscribe(function() {
          updateToggleState();
          refreshEnterpriseUI();
        });
      }
    })();
  </script>
{% endblock %}

{% block footer %}
  {{ super() }}
{% endblock %}

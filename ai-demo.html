<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainSAIT AI Demo - اختبار مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020408; color: #e2e8f0; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold text-sovereign-500 mb-8">🧪 BrainSAIT AI Demo - اختبار مباشر</h1>

    <!-- Test 1: Tender Search -->
    <div class="mb-8 p-6 bg-sovereign-500/10 rounded-xl border border-sovereign-500/30">
        <h2 class="text-xl font-bold mb-4">🔍 محلل كراسات اعتماد (28,611)</h2>
        <input id="tenderVal" type="text" class="w-full p-3 bg-black/50 rounded border border-white/20 mb-3" placeholder="اكتب موضوع للبحث (مثال: بناء مستشفى)">
        <button onclick="testSearch()" class="w-full py-3 bg-sovereign-500 text-black font-bold rounded">بحث</button>
        <pre id="tenderOut" class="mt-4 p-4 bg-black/30 rounded text-sm overflow-auto"></pre>
    </div>

    <!-- Test 2: Classify -->
    <div class="mb-8 p-6 bg-emerald-500/10 rounded-xl border border-emerald-500/30">
        <h2 class="text-xl font-bold mb-4">🏥 تصنيف نفيس</h2>
        <input id="classVal" type="text" class="w-full p-3 bg-black/50 rounded border border-white/20 mb-3" placeholder="مثال: مستشفى - علاج مرضى">
        <button onclick="testClass()" class="w-full py-3 bg-emerald-500 text-black font-bold rounded">تصنيف</button>
        <pre id="classOut" class="mt-4 p-4 bg-black/30 rounded text-sm overflow-auto"></pre>
    </div>

<script>
const API = 'https://wathq-milestone-api.brainsait-fadil.workers.dev';
const KEY = 'EQMc2uonE6iViTfUjJ2KARG9a3yDDwdQ';

async function testSearch() {
    var txt = document.getElementById('tenderVal').value.trim();
    var out = document.getElementById('tenderOut');
    if(!txt) { out.textContent = 'الرجاء إدخال نص'; return; }
    out.textContent = 'جاري البحث...';
    try {
        var r = await fetch(API + '/wathq/v1/ai/ml/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY},
            body: JSON.stringify({query: txt.substring(0, 300), limit: 5})
        });
        var d = await r.json();
        out.textContent = JSON.stringify(d, null, 2);
    } catch(e) { out.textContent = 'Error: ' + e.message; }
}

async function testClass() {
    var txt = document.getElementById('classVal').value.trim();
    var out = document.getElementById('classOut');
    if(!txt) { out.textContent = 'الرجاء إدخال نص'; return; }
    out.textContent = 'جاري التصنيف...';
    try {
        var r = await fetch(API + '/wathq/v1/ai/ml/classify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY},
            body: JSON.stringify({entities: [txt.substring(0,50)], purposes: []})
        });
        var d = await r.json();
        out.textContent = JSON.stringify(d, null, 2);
    } catch(e) { out.textContent = 'Error: ' + e.message; }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | BrainSAIT</title>
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://brainsait.org/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --midnight:#02040a; --gold:#c9a84c; --gold-light:#e8c97e; --teal:#0ea5e9; --orange:#ea580c; --white:#fff; --textd:rgba(255,255,255,0.62); }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    font-family:'IBM Plex Sans Arabic', system-ui, sans-serif;
    background:radial-gradient(ellipse at top, #0a0f1e 0%, #02040a 60%, #000 100%);
    color:var(--white); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem; overflow:hidden;
  }
  .wrap { max-width:640px; position:relative; z-index:2; }
  .code {
    font-family:'Syne', sans-serif; font-weight:800;
    font-size:clamp(6rem, 18vw, 11rem); line-height:0.95;
    background:linear-gradient(135deg, #fff 0%, var(--gold-light) 40%, var(--teal) 80%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; margin-bottom:1rem;
  }
  h1 {
    font-family:'Syne', sans-serif; font-weight:700;
    font-size:clamp(1.4rem, 3.5vw, 2rem); margin-bottom:0.75rem;
  }
  h1 .ar { display:block; font-size:0.85em; color:var(--gold-light); margin-top:0.3rem; }
  p.sub { color:var(--textd); font-size:1rem; line-height:1.7; margin-bottom:2.5rem; max-width:520px; margin-left:auto; margin-right:auto; }
  .ctas { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  .btn {
    display:inline-flex; align-items:center; gap:0.5rem;
    font-weight:600; font-size:0.95rem; padding:0.85rem 2rem;
    border-radius:100px; text-decoration:none; transition:transform 0.2s, box-shadow 0.2s;
  }
  .btn-gold {
    background:linear-gradient(135deg, var(--gold), var(--orange));
    color:var(--midnight); box-shadow:0 0 30px rgba(201,168,76,0.3);
  }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(201,168,76,0.5); }
  .btn-outline { color:var(--white); border:1px solid rgba(255,255,255,0.2); }
  .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
  .links {
    margin-top:3rem; padding-top:2rem;
    border-top:1px solid rgba(255,255,255,0.08);
    display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap;
    font-size:0.85rem;
  }
  .links a { color:rgba(255,255,255,0.55); text-decoration:none; transition:color 0.2s; }
  .links a:hover { color:var(--gold-light); }
  .glow {
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(circle at 50% 40%, rgba(201,168,76,0.10), transparent 60%);
  }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main class="wrap" role="main">
    <div class="code" aria-hidden="true">404</div>
    <h1>
      <span class="en">Page not found</span>
      <span class="ar" dir="rtl">الصفحة غير موجودة</span>
    </h1>
    <p class="sub">
      The page you're looking for has moved, been renamed, or never existed.
      Let's get you back on track.
    </p>
    <div class="ctas">
      <a href="/" class="btn btn-gold">← Back to Home</a>
      <a href="/#solutions" class="btn btn-outline">Browse Solutions</a>
    </div>
    <nav class="links" aria-label="Quick links">
      <a href="https://hnh.brainsait.org">Platform</a>
      <a href="https://academy.brainsait.org">Academy</a>
      <a href="/wathq">Wathq Hub</a>
      <a href="https://portal.elfadil.com">RCM Portal</a>
      <a href="mailto:hello@brainsait.org">Contact</a>
    </nav>
  </main>
</body>
</html>

name: Build and Deploy Documentation

on:
  push:
    branches:
      - main-enterprise
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main-enterprise
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip cache (for debugging)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pip dependencies
        if: inputs.skip_cache != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Configure Git for timestamps
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Run spell checker
        continue-on-error: true
        run: |
          codespell docs/ \
            --skip="*.ar.md,*.json,*.css" \
            --ignore-words-list="brainsait,nphies,fhir,linc,cloudpital,rcm,oid,efhm" \
            --quiet-level=2

      - name: Run markdown linter
        continue-on-error: true
        run: |
          npx markdownlint-cli2 "docs/**/*.md" --config .markdownlint.json || echo "Markdown lint completed with warnings"

      - name: Build documentation
        run: mkdocs build --verbose
        env:
          ENABLE_PDF_EXPORT: 0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # Deployment job (on push to main or manual dispatch)
  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main-enterprise') || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Validation job for PRs
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate build artifacts
        run: |
          echo "Build succeeded - documentation is valid"
          echo "Artifacts validated for deployment"

  # Notification job
  notify:
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: |
          echo "Documentation deployed successfully!"
          echo "View at: https://fadil369.github.io/brainsait-docs/"

      - name: Notify on failure
        if: needs.build.result == 'failure' || needs.deploy.result == 'failure'
        run: |
          echo "Documentation build/deploy failed"
          echo "Please check the workflow logs for details"
          exit 1

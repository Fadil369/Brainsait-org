site_name: BrainSAIT Knowledge System | نظام معرفة برينسايت
site_url: https://fadil369.github.io/brainsait-docs/
site_description: Unified documentation platform for BrainSAIT Healthcare AI - منصة التوثيق الموحدة لبرينسايت
site_author: Dr. Mohamed El Fadil
repo_url: https://github.com/Fadil369/brainsait-docs
repo_name: Fadil369/brainsait-docs

theme:
  name: material
  custom_dir: overrides
  language: en
  direction: ltr

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: brainsait
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode | التبديل للوضع الليلي
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode | التبديل للوضع النهاري
    # High-contrast mode for accessibility
    - scheme: default
      primary: black
      accent: deep-orange
      toggle:
        icon: material/brightness-auto
        name: Switch to high contrast mode | التبديل للوضع عالي التباين

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

  font:
    text: Inter
    code: Fira Code

  icon:
    logo: material/brain
    repo: fontawesome/brands/github
  
  favicon: assets/images/favicon.ico

extra:
  alternate:
    - name: English
      link: /brainsait-docs/en/
      lang: en
    - name: العربية
      link: /brainsait-docs/ar/
      lang: ar

  meta:
    description: "Dr. Mohamed Al Fadil – Physician, Tech Entrepreneur & Founder of BrainSAIT. Healthcare technology expertise, HIPAA-compliant solutions, AI integration and more."
    keywords: "general practitioner, healthcare technology, BrainSAIT, FHIR implementation, digital health transformation, AI healthcare, NPHIES integration"
    # Open Graph metadata for social sharing
    og_type: website
    og_title: BrainSAIT Knowledge System
    og_description: Unified documentation platform for BrainSAIT Healthcare AI ecosystem
    og_image: assets/images/og-preview.svg
    og_locale: en_US
    # Twitter Card metadata
    twitter_card: summary_large_image
    twitter_site: "@brainsait369"
    twitter_creator: "@brainsait369"

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brainsait
    - icon: fontawesome/brands/github
      link: https://github.com/fadil369
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/brainsait
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/fadil369
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/brainsait369

  # Contact information
  contact:
    email: contact@brainsait.com
    support: support@brainsait.com

  brainsait:
    colors:
      midnight_blue: "#1a365d"
      medical_blue: "#2b6cb8"
      signal_teal: "#0ea5e9"
      deep_orange: "#ea580c"
      forest_green: "#059669"

    oid: "1.3.6.1.4.1.61026"

    agents:
      - ClaimLinc
      - PolicyLinc
      - DocsLinc
      - RadioLinc
      - Voice2Care
      - MasterLinc
      - DevLinc
      - DataLinc
      - SecUnit
      - ProcessLinc

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ar
      separator: '[\s\-\.]+'
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:

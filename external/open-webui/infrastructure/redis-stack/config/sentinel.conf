port 26379
bind 0.0.0.0
protected-mode yes

dir /tmp

sentinel monitor brainsait-master redis-primary 6379 2
sentinel auth-pass brainsait-master ${REDIS_PASSWORD}
sentinel down-after-milliseconds brainsait-master 5000
sentinel failover-timeout brainsait-master 10000
sentinel parallel-syncs brainsait-master 1

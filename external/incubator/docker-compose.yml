version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: brainsait-postgres
    environment:
      POSTGRES_DB: brainsait_db
      POSTGRES_USER: brainsait
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - brainsait-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainsait -d brainsait_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: brainsait-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - brainsait-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: packages/brainsait-backend/Dockerfile
    container_name: brainsait-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://brainsait:password123@postgres:5432/brainsait_db
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-for-development
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "5000:5000"
    volumes:
      - ./packages/brainsait-backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brainsait-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Document Service
  docs:
    build:
      context: .
      dockerfile: packages/brainsait-docs/Dockerfile
    container_name: brainsait-docs
    environment:
      NODE_ENV: development
      PORT: 5002
      CORS_ORIGINS: http://localhost:3000,http://localhost:5000
      PUPPETEER_HEADLESS: true
    ports:
      - "5002:5002"
    volumes:
      - ./packages/brainsait-docs:/app
      - /app/node_modules
      - ./packages/brainsait-docs/templates:/app/templates
      - ./packages/brainsait-docs/output:/app/output
    networks:
      - brainsait-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Additional resources for Puppeteer
    shm_size: 2g
    cap_add:
      - SYS_ADMIN

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: packages/brainsait-frontend/Dockerfile
    container_name: brainsait-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_DOCS_URL: http://localhost:5002
    ports:
      - "3000:3000"
    volumes:
      - ./packages/brainsait-frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
      - docs
    networks:
      - brainsait-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: brainsait-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - docs
    networks:
      - brainsait-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  brainsait-network:
    driver: bridge